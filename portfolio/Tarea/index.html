<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Modeling</title>
    <link rel="stylesheet" href="./src/css/main.css">
    <!-- Import the component -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
</head>

<body>

<div class="ei">
    <div class="ei-bound ei-bound-left"></div>

    <p>
        <span>M</span>
        <span>U</span>
        <span>N</span>
        <span>D</span>
        <span>O</span>
        <span class="ei-space">&nbsp;</span>
        <span>P</span>
        <span>O</span>
        <span>K</span>
        <span>E</span>
        <span>M</span>
        <span>O</span>
        <span>N</span>
    </p>

    <div class="ei-bound ei-bound-right"></div>
</div>

    <!-- Use it like any other HTML element -->
    <model-viewer alt="Scene 3d" src="./src/models/glb/Pokemon.glb" shadow-intensity="1" ar camera-controls
        touch-action="pan-y">

        <button slot="ar-button" id="ar-button">
            View in your space
        </button>

        <div id="ar-prompt">
            <img src="./src/img/hand.png">
        </div>

        <button id="ar-failure">
            AR is not tracking!
        </button>

        <div class="slider">
            <div class="slides">
                <button class="slide selected" onclick="switchSrc(this, 'fondo')"
                    style="background-image: url('./src/img/Fondo.png');">
                </button>
                <button class="slide" onclick="switchSrc(this, 'snorx')"
                    style="background-image: url('./src/img/snorx.png');">
                </button>
                <button class="slide" onclick="switchSrc(this, 'poke')"
                    style="background-image: url('./src/img/poke.png');">
                </button>
            </div>
        </div>
    </model-viewer>

    <script type="module">
        const modelViewer = document.querySelector("model-viewer");

        window.switchSrc = (element, name) => {
            const base = "./src/models/glb/" + name;
            modelViewer.src = base + '.glb';
            const slides = document.querySelectorAll(".slide");
            slides.forEach((element) => { element.classList.remove("selected"); });
            element.classList.add("selected");
        };

        document.querySelector(".slider").addEventListener('beforexrselect', (ev) => {
            // Keep slider interactions from affecting the XR scene.
            ev.preventDefault();
        });
    </script>

</body>

</html>
