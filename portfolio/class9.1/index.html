<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon World</title>
    <link rel="stylesheet" href="./src/css/main.css">
    <link rel="icon" type="image/jpg" href="./src/img/icono.png">
</head>
<body>
    <div class="placeholder">
        <canvas id="universe"></canvas>

        <div class="container" id="containerId">
            <h1>Pokemon World</h1>

            <div id="menu">
                <ul>
                    <li onclick="select(this)"><span>NewGame</span></li>
                    <li onclick="select(this)"><span>Characters</span></li>
                    <li onclick="select(this)"><span>Settings</span></li>
                    <li onclick="select(this)"><span>Exit</span></li>
                </ul>
            </div>
        </div>
    </div>

    <audio loop autoplay id="miAudio">
        <source src="./src/sounds/Opening Pokemon.mp3" type="audio/mpeg">
    </audio>

    <script src="./src/js/main.js"></script>
</body>
</html>
