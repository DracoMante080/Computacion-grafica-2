<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon World - New Game</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #87ceeb;
      font-family: Arial, sans-serif;
    }

    #game-container {
      width: 100vw;
      height: 100vh;
    }

    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 20;
      padding: 14px 16px;
      min-width: 220px;
      border: 3px solid #2b4da2;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.18);
    }

    .back-btn {
      margin-top: 10px;
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      background: #ffc91f;
      color: #17356e;
      font-weight: bold;
    }

    .back-btn:hover {
      filter: brightness(1.05);
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.19/+esm"
    }
  }
  </script>
</head>
<body>
  <div id="hud">
    <div><strong>POKEMON WORLD</strong></div>
    <div>3D Scene</div>
    <button class="back-btn" onclick="goBack()">Back</button>
  </div>

  <div id="game-container"></div>

  <audio id="bgMusic" loop>
    <source src="../src/sounds/batalla.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <script>
    function goBack() {
      window.location.href = "../index.html";
    }

    window.addEventListener("load", function () {
      const audio = document.getElementById("bgMusic");
      if (!audio) return;

      audio.volume = 0.5;

      function reproducir() {
        audio.play().then(function () {
          document.removeEventListener("click", reproducir);
          document.removeEventListener("keydown", reproducir);
        }).catch(function () {
          console.log("Esperando interacción para reproducir audio...");
        });
      }

      document.addEventListener("click", reproducir);
      document.addEventListener("keydown", reproducir);
    });
  </script>

  <script type="module" src="../src/js/mainLevel.js"></script>
</body>
</html>
