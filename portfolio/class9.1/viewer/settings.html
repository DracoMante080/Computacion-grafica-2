<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon World - Settings</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
            font-family: 'Fredoka', sans-serif;
        }

        body {
            color: #18315c;
            background:
                radial-gradient(circle at 14% 14%, rgba(255,255,255,0.95) 0 5%, transparent 6%),
                radial-gradient(circle at 84% 14%, rgba(255,255,255,0.95) 0 5%, transparent 6%),
                linear-gradient(180deg, #8fdcff 0%, #d4f6ff 34%, #eefcff 56%, #ffe980 57%, #ffca41 75%, #ff9f1c 100%);
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            left: 50%;
            top: 85px;
            transform: translateX(-50%);
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.95) 0 20%, rgba(255,90,90,0.96) 20% 48%, #ffffff 48% 52%, #ffffff 52% 100%);
            border: 7px solid #202020;
            box-shadow: 0 14px 30px rgba(0,0,0,0.18);
            opacity: 0.12;
            z-index: 0;
        }

        .screen-container {
            width: 94%;
            max-width: 1160px;
            margin: 36px auto;
            padding: 28px;
            position: relative;
            z-index: 2;
            background: rgba(255,255,255,0.9);
            border: 6px solid #2d4ea3;
            border-radius: 30px;
            box-shadow:
                0 12px 0 #183672,
                0 22px 34px rgba(0,0,0,0.16);
        }

        .screen-container::before {
            content: "";
            position: absolute;
            inset: 14px;
            border: 4px dotted #ffcf33;
            border-radius: 20px;
            pointer-events: none;
        }

        .screen-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .screen-header h1 {
            margin: 0;
            font-size: 3rem;
            font-weight: 700;
            color: #ffcf33;
            text-shadow:
                -3px -3px 0 #2451a7,
                3px -3px 0 #2451a7,
                -3px 3px 0 #2451a7,
                3px 3px 0 #2451a7;
        }

        .subtitle {
            margin-top: 10px;
            font-size: 1rem;
            font-weight: 700;
            color: #2451a7;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(280px, 1fr));
            gap: 22px;
        }

        .setting-box {
            background: linear-gradient(180deg, #ffffff 0%, #eef8ff 100%);
            border: 4px solid #2d4ea3;
            border-radius: 22px;
            padding: 20px;
            box-shadow:
                0 7px 0 #183672,
                0 12px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .setting-box:nth-child(odd) {
            background: linear-gradient(180deg, #fffce5 0%, #ffeeb0 100%);
        }

        .setting-box label {
            font-size: 1rem;
            font-weight: 700;
            color: #1b3b73;
        }

        .setting-box input[type="range"],
        .setting-box select {
            width: 100%;
            padding: 11px 12px;
            border-radius: 14px;
            border: 3px solid #2d4ea3;
            background: #ffffff;
            color: #26466c;
            font-family: 'Fredoka', sans-serif;
            font-size: 1rem;
            font-weight: 600;
        }

        .setting-box input[type="checkbox"] {
            width: 24px;
            height: 24px;
            accent-color: #ffcb29;
        }

        .check-row {
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
        }

        .bottom-actions {
            margin-top: 28px;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .primary-btn,
        .secondary-btn {
            border: none;
            border-radius: 16px;
            padding: 12px 24px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
        }

        .primary-btn {
            background: linear-gradient(180deg, #fff05d 0%, #ffc91f 100%);
            color: #17356e;
            border: 4px solid #2d4ea3;
            box-shadow: 0 5px 0 #183672;
        }

        .secondary-btn {
            background: linear-gradient(180deg, #4c8fff 0%, #2451a7 100%);
            color: white;
            border: 4px solid #ffd22e;
            box-shadow: 0 5px 0 #183672;
        }

        .primary-btn:hover,
        .secondary-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        @media (max-width: 900px) {
            .settings-grid {
                grid-template-columns: 1fr;
            }

            .screen-header h1 {
                font-size: 2.3rem;
            }

            .screen-container {
                width: 95%;
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="screen-container">
        <div class="screen-header">
            <h1>Pokemon World</h1>
            <p class="subtitle">Trainer Settings</p>
        </div>

        <div class="settings-grid">
            <div class="setting-box">
                <label for="musicVolume">Music Volume</label>
                <input type="range" id="musicVolume" min="0" max="100" value="70">
            </div>

            <div class="setting-box">
                <label for="effectsVolume">Effects Volume</label>
                <input type="range" id="effectsVolume" min="0" max="100" value="80">
            </div>

            <div class="setting-box">
                <label for="difficulty">Difficulty</label>
                <select id="difficulty">
                    <option value="Easy">Easy</option>
                    <option value="Normal" selected>Normal</option>
                    <option value="Hard">Hard</option>
                    <option value="Champion">Champion</option>
                </select>
            </div>

            <div class="setting-box">
                <label for="graphics">Graphics Quality</label>
                <select id="graphics">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High" selected>High</option>
                    <option value="Ultra">Ultra</option>
                </select>
            </div>

            <div class="setting-box">
                <label for="language">Language</label>
                <select id="language">
                    <option value="Spanish" selected>Spanish</option>
                    <option value="English">English</option>
                </select>
            </div>

            <div class="setting-box check-row">
                <label for="fullscreen">Fullscreen</label>
                <input type="checkbox" id="fullscreen">
            </div>

            <div class="setting-box check-row">
                <label for="battleEffects">Battle Effects</label>
                <input type="checkbox" id="battleEffects" checked>
            </div>

            <div class="setting-box check-row">
                <label for="showSubtitles">Show Subtitles</label>
                <input type="checkbox" id="showSubtitles" checked>
            </div>
        </div>

        <div class="bottom-actions">
            <button class="primary-btn" onclick="saveSettings()">Save Settings</button>
            <button class="secondary-btn" onclick="goBack()">Back to Menu</button>
        </div>
    </div>

    <script>
        function saveSettings() {
            const settings = {
                musicVolume: document.getElementById("musicVolume").value,
                effectsVolume: document.getElementById("effectsVolume").value,
                difficulty: document.getElementById("difficulty").value,
                graphics: document.getElementById("graphics").value,
                language: document.getElementById("language").value,
                fullscreen: document.getElementById("fullscreen").checked,
                battleEffects: document.getElementById("battleEffects").checked,
                showSubtitles: document.getElementById("showSubtitles").checked
            };

            localStorage.setItem("pokemonSettings", JSON.stringify(settings));
            alert("Settings saved successfully!");
        }

        function goBack() {
            window.location.href = "../index.html";
        }

        window.addEventListener("load", function () {
            const savedSettings = JSON.parse(localStorage.getItem("pokemonSettings"));

            if (savedSettings) {
                document.getElementById("musicVolume").value = savedSettings.musicVolume;
                document.getElementById("effectsVolume").value = savedSettings.effectsVolume;
                document.getElementById("difficulty").value = savedSettings.difficulty;
                document.getElementById("graphics").value = savedSettings.graphics;
                document.getElementById("language").value = savedSettings.language;
                document.getElementById("fullscreen").checked = savedSettings.fullscreen;
                document.getElementById("battleEffects").checked = savedSettings.battleEffects;
                document.getElementById("showSubtitles").checked = savedSettings.showSubtitles;
            }
        });
    </script>
</body>
</html>
